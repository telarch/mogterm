<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mogterm</title>
  <link rel="stylesheet" href="src/mogterm.css">
</head>
<body style="margin: 20px; background: #111;">
  <div id="terminal"></div>
  <script src="src/mogterm.js"></script>
  <script>
    const term = new Mogterm(document.getElementById("terminal"), {
      prompt: "$ ",
      onCommand(cmd) {
        if (cmd.trim() === "") return;
        term.writeLine("mogterm: command not found: " + cmd);
      },
    });
    term.focus();
  </script>
</body>
</html>
